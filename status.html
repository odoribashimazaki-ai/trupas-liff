<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>TRUPAS - My Status</title>
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    :root {
      --navy: #16213e;
      --navy-light: #1a2744;
      --gold: #c9a96e;
      --gold-light: #e8d5b0;
      --ivory: #faf8f5;
      --text: #2c2c2c;
      --text-sub: #8a8a8a;
      --success: #4a7c59;
      --error: #a04040;
      --bronze: #cd7f32;
      --silver: #a0a0a0;
      --gold-tier: #c9a96e;
      --platinum: #8c9ead;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', 'Yu Gothic', sans-serif;
      background: var(--navy);
      min-height: 100vh;
      padding: 24px 20px;
    }
    .brand {
      text-align: center;
      margin-bottom: 24px;
    }
    .brand-name {
      font-size: 13px;
      letter-spacing: 6px;
      color: var(--gold);
      font-weight: 500;
    }
    .brand-tagline {
      font-size: 10px;
      letter-spacing: 2px;
      color: rgba(201,169,110,0.5);
      margin-top: 4px;
    }

    /* Tier Card */
    .tier-card {
      background: #fff;
      border-radius: 16px;
      width: 100%;
      max-width: 360px;
      margin: 0 auto 20px;
      overflow: hidden;
    }
    .tier-header {
      background: var(--navy);
      padding: 28px 24px 20px;
      text-align: center;
      border-bottom: 2px solid var(--gold);
      position: relative;
    }
    .tier-badge {
      width: 80px; height: 80px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 12px;
      font-size: 32px;
      position: relative;
    }
    .tier-badge::after {
      content: '';
      position: absolute;
      inset: -3px;
      border-radius: 50%;
      border: 2px solid;
      border-color: inherit;
    }
    .tier-badge.bronze { background: rgba(205,127,50,0.15); border-color: var(--bronze); color: var(--bronze); }
    .tier-badge.silver { background: rgba(160,160,160,0.15); border-color: var(--silver); color: var(--silver); }
    .tier-badge.gold { background: rgba(201,169,110,0.15); border-color: var(--gold-tier); color: var(--gold-tier); }
    .tier-badge.platinum { background: rgba(140,158,173,0.15); border-color: var(--platinum); color: var(--platinum); }
    .tier-name {
      font-size: 20px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 3px;
      text-transform: uppercase;
    }
    .user-name {
      font-size: 13px;
      color: var(--gold-light);
      margin-top: 6px;
      letter-spacing: 1px;
    }
    .tier-body {
      padding: 24px;
    }

    /* Stats Row */
    .stats-row {
      display: flex;
      gap: 12px;
    }
    .stat-item {
      flex: 1;
      background: var(--ivory);
      border-radius: 12px;
      padding: 16px 12px;
      text-align: center;
    }
    .stat-value {
      font-size: 24px;
      font-weight: 700;
      color: var(--navy);
    }
    .stat-label {
      font-size: 10px;
      color: var(--text-sub);
      letter-spacing: 1px;
      margin-top: 2px;
    }

    /* Medals Section */
    .medals-card {
      background: #fff;
      border-radius: 16px;
      width: 100%;
      max-width: 360px;
      margin: 0 auto 20px;
      overflow: hidden;
    }
    .medals-header {
      background: var(--navy);
      padding: 14px 24px;
      border-bottom: 2px solid var(--gold);
    }
    .medals-title {
      font-size: 11px;
      color: var(--gold);
      letter-spacing: 1px;
      font-weight: 600;
    }
    .medals-body {
      padding: 20px 24px;
    }
    .medals-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }
    .medal-tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 12px;
      background: var(--ivory);
      border-radius: 20px;
      font-size: 12px;
      color: var(--navy);
      font-weight: 500;
      line-height: 1.4;
    }
    .medal-tag .medal-icon {
      font-size: 16px;
    }
    .medals-empty {
      font-size: 13px;
      color: var(--text-sub);
      text-align: center;
      padding: 8px 0;
    }

    /* Tier Roadmap */
    .roadmap-card {
      background: #fff;
      border-radius: 16px;
      width: 100%;
      max-width: 360px;
      margin: 0 auto 20px;
      overflow: hidden;
    }
    .roadmap-header {
      background: var(--navy);
      padding: 14px 24px;
      border-bottom: 2px solid var(--gold);
    }
    .roadmap-title {
      font-size: 11px;
      color: var(--gold);
      letter-spacing: 1px;
      font-weight: 600;
    }
    .roadmap-body {
      padding: 20px 24px;
    }
    .roadmap-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 10px 0;
    }
    .roadmap-item + .roadmap-item {
      border-top: 1px solid #f0ede8;
    }
    .roadmap-dot {
      width: 32px; height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
    }
    .roadmap-dot.active {
      border: 2px solid;
    }
    .roadmap-dot.locked {
      background: #f0ede8;
      opacity: 0.6;
    }
    .roadmap-dot.bronze { background: rgba(205,127,50,0.15); border-color: var(--bronze); }
    .roadmap-dot.silver { background: rgba(160,160,160,0.15); border-color: var(--silver); }
    .roadmap-dot.gold-t { background: rgba(201,169,110,0.15); border-color: var(--gold-tier); }
    .roadmap-dot.platinum-t { background: rgba(140,158,173,0.15); border-color: var(--platinum); }
    .roadmap-info {
      flex: 1;
    }
    .roadmap-tier-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
    }
    .roadmap-tier-name.current {
      color: var(--gold);
    }
    .roadmap-check {
      color: var(--success);
      font-size: 16px;
    }

    /* Footer */
    .footer {
      text-align: center;
      margin-top: 24px;
      padding-bottom: 20px;
    }
    .footer-text {
      font-size: 10px;
      letter-spacing: 2px;
      color: rgba(201,169,110,0.35);
    }

    /* Loading */
    .loading-view {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
    }
    .dot-pulse {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }
    .dot-pulse span {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--gold);
      animation: pulse 1.2s ease-in-out infinite;
    }
    .dot-pulse span:nth-child(2) { animation-delay: 0.2s; }
    .dot-pulse span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes pulse {
      0%, 100% { opacity: 0.3; transform: scale(0.8); }
      50% { opacity: 1; transform: scale(1); }
    }
    .loading-text {
      font-size: 12px;
      color: var(--gold-light);
      letter-spacing: 1px;
    }

    /* Error */
    .error-view {
      display: none;
      text-align: center;
      padding: 40px 20px;
    }
    .error-icon {
      font-size: 48px;
      margin-bottom: 16px;
    }
    .error-msg {
      font-size: 14px;
      color: var(--gold-light);
      line-height: 1.7;
    }
    .retry-btn {
      margin-top: 20px;
      padding: 12px 32px;
      background: transparent;
      border: 1px solid var(--gold);
      color: var(--gold);
      border-radius: 8px;
      font-size: 13px;
      letter-spacing: 1px;
      cursor: pointer;
    }

    /* Not Found */
    .notfound-view {
      display: none;
      text-align: center;
      padding: 40px 20px;
    }
    .notfound-icon {
      font-size: 48px;
      margin-bottom: 16px;
    }
    .notfound-msg {
      font-size: 14px;
      color: var(--gold-light);
      line-height: 1.7;
    }

    /* Main Content */
    .main-content { display: none; }

    /* Animations */
    .fade-in {
      animation: fadeIn 0.5s ease forwards;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="brand">
    <div class="brand-name">TRUPAS</div>
    <div class="brand-tagline">PRIVILEGE &amp; CONDUCT PROGRAM</div>
  </div>

  <!-- Loading View -->
  <div id="loadingView" class="loading-view">
    <div class="dot-pulse"><span></span><span></span><span></span></div>
    <div class="loading-text">ステータスを取得しています...</div>
  </div>

  <!-- Error View -->
  <div id="errorView" class="error-view">
    <div class="error-icon"><svg width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><path d="M12 9v4M12 17h.01"/></svg></div>
    <div class="error-msg" id="errorMsg">データの取得に失敗しました。<br>もう一度お試しください。</div>
    <button class="retry-btn" onclick="location.reload()">再読み込み</button>
  </div>

  <!-- Not Found View -->
  <div id="notfoundView" class="notfound-view">
    <div class="notfound-icon"><svg width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg></div>
    <div class="notfound-msg">ステータス情報が見つかりません。<br>チェックインをして最初の訪問を<br>記録しましょう。</div>
  </div>

  <!-- Main Content -->
  <div id="mainContent" class="main-content">
    <!-- Tier Card -->
    <div class="tier-card fade-in">
      <div class="tier-header">
        <div class="tier-badge" id="tierBadge"></div>
        <div class="tier-name" id="tierName">BRONZE</div>
        <div class="user-name" id="userName"></div>
      </div>
      <div class="tier-body">
        <div class="stats-row">
          <div class="stat-item">
            <div class="stat-value" id="visitCount">0</div>
            <div class="stat-label">VISITS</div>
          </div>
          <div class="stat-item">
            <div class="stat-value" id="medalCount">0</div>
            <div class="stat-label">MEDALS</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Medals Card -->
    <div class="medals-card fade-in" style="animation-delay: 0.1s">
      <div class="medals-header">
        <div class="medals-title">獲得メダル / EARNED MEDALS</div>
      </div>
      <div class="medals-body">
        <div class="medals-grid" id="medalsGrid"></div>
      </div>
    </div>

    <!-- Tier Roadmap -->
    <div class="roadmap-card fade-in" style="animation-delay: 0.2s">
      <div class="roadmap-header">
        <div class="roadmap-title">ステータスの道のり / TIER ROADMAP</div>
      </div>
      <div class="roadmap-body" id="roadmapBody"></div>
    </div>
  </div>

  <div class="footer">
    <div class="footer-text">TRUPAS — Trust, Recognized and Preserved</div>
  </div>

  <script>
    const CONFIG = {
      LIFF_ID: '2008787040-MgHllqnm',
      WEBHOOK_STATUS: 'https://hook.eu1.make.com/utmb89k86th8tih9y370cxc8kwwl8p23'
    };

    function svgIcon(d, sw) {
      return '<svg width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="' + (sw || 1.5) + '" stroke-linecap="round" stroke-linejoin="round">' + d + '</svg>';
    }
    var SVG_SHIELD = svgIcon('<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>');
    var SVG_CROWN  = svgIcon('<path d="M2 20h20M4 20l2-14 4 6 2-8 2 8 4-6 2 14"/>');
    var SVG_GEM    = svgIcon('<path d="M6 3h12l4 6-10 13L2 9z"/><path d="M2 9h20M12 22l4-13M12 22L8 9m4-6v6"/>');

    const TIERS = [
      { name: 'Bronze', icon: SVG_SHIELD, cssClass: 'bronze' },
      { name: 'Silver', icon: SVG_SHIELD, cssClass: 'silver' },
      { name: 'Gold', icon: SVG_CROWN, cssClass: 'gold' },
      { name: 'Platinum', icon: SVG_GEM, cssClass: 'platinum' }
    ];

    const MEDAL_DATA = {
      'Courteous':   { icon: svgIcon('<path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/>'), ja: '礼儀正しい' },
      'Considerate': { icon: svgIcon('<path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/>'), ja: '思いやり' },
      'Punctual':    { icon: svgIcon('<circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>'), ja: '時間厳守' },
      'Pristine':    { icon: svgIcon('<path d="M12 3l1.5 4.5L18 9l-4.5 1.5L12 15l-1.5-4.5L6 9l4.5-1.5z"/><path d="M19 13l.8 2.2L22 16l-2.2.8L19 19l-.8-2.2L16 16l2.2-.8z"/>'), ja: '清潔' },
      'Gentle':      { icon: svgIcon('<path d="M20.24 12.24a6 6 0 00-8.49-8.49L5 10.5V19h8.5z"/><path d="M16 8L2 22M17.5 15H9"/>'), ja: '穏やか' },
      'Selfless':    { icon: svgIcon('<path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/>'), ja: '無私の心' },
      'Gracious':    { icon: svgIcon('<path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14l-5-4.87 6.91-1.01z"/>'), ja: '寛大' },
      'Inclusive':    { icon: svgIcon('<circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/>'), ja: '包容力' },
      'Reliable':    { icon: svgIcon('<circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/>'), ja: '信頼できる' },
      'Transparent': { icon: svgIcon('<path d="M12 2l10 10-10 10L2 12z"/>'), ja: '誠実' },
      'Consistent':  { icon: svgIcon('<polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/>'), ja: '一貫性' },
      'Accountable': { icon: svgIcon('<polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/>'), ja: '責任感' },
      'Attentive':   { icon: svgIcon('<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>'), ja: '気配り' },
      'Empathetic':  { icon: svgIcon('<path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0016.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 002 8.5c0 2.3 1.5 4.05 3 5.5l7 7z"/>'), ja: '共感力' },
      'Nurturing':   { icon: svgIcon('<path d="M7 20h10M12 20c5.5-2.5.8-6.4 3-10"/><path d="M9.5 9.4c1.1.8 1.8 2.2 2.3 3.7-2 .4-3.5.4-4.8-.3-1.2-.6-2.3-1.9-3-4.2 2.8-.5 4.4 0 5.5.8z"/><path d="M14.1 6a7 7 0 00-1.1 4c1.9-.1 3.3-.6 4.3-1.4 1-1 1.6-2.3 1.7-4.6-2.7.1-4 1-4.9 2z"/>'), ja: '育む心' }
    };

    function showView(viewId) {
      ['loadingView', 'errorView', 'notfoundView', 'mainContent'].forEach(function(id) {
        document.getElementById(id).style.display = 'none';
      });
      document.getElementById(viewId).style.display = viewId === 'mainContent' ? 'block' : 'flex';
    }

    function getTierIndex(tierName) {
      for (var i = 0; i < TIERS.length; i++) {
        if (TIERS[i].name === tierName) return i;
      }
      return 0;
    }

    function renderStatus(data) {
      var user = data.user;
      var tierName = user.tier || 'Bronze';
      var tierIndex = getTierIndex(tierName);
      var tierInfo = TIERS[tierIndex];
      var visits = user.visit_count || 0;
      var medals = user.medals || (user.medals_csv ? user.medals_csv.split(',') : []);

      // Tier badge
      var badge = document.getElementById('tierBadge');
      badge.innerHTML = tierInfo.icon;
      badge.className = 'tier-badge ' + tierInfo.cssClass;

      // Tier name
      document.getElementById('tierName').textContent = tierInfo.name.toUpperCase();

      // User name
      var userName = user.display_name || 'Guest';
      document.getElementById('userName').textContent = userName;

      // Stats
      animateNumber('visitCount', visits);
      animateNumber('medalCount', medals.length);

      // Medals
      renderMedals(medals);

      // Roadmap
      renderRoadmap(tierIndex);

      showView('mainContent');
    }

    function renderMedals(medals) {
      var grid = document.getElementById('medalsGrid');
      grid.innerHTML = '';
      if (medals.length === 0) {
        grid.innerHTML = '<div class="medals-empty">まだメダルを獲得していません</div>';
        return;
      }
      medals.forEach(function(medal) {
        var tag = document.createElement('div');
        tag.className = 'medal-tag';
        var data = MEDAL_DATA[medal] || { icon: svgIcon('<circle cx="12" cy="12" r="8"/><path d="M12 8v0M8 14s1.5 2 4 2 4-2 4-2"/>'), ja: medal };
        tag.innerHTML = '<span class="medal-icon">' + data.icon + '</span>' + data.ja + ' / ' + medal;
        grid.appendChild(tag);
      });
    }

    function renderRoadmap(currentIndex) {
      var body = document.getElementById('roadmapBody');
      body.innerHTML = '';
      TIERS.forEach(function(tier, i) {
        var item = document.createElement('div');
        item.className = 'roadmap-item';

        var dotClass = i <= currentIndex
          ? 'roadmap-dot active ' + (tier.cssClass === 'gold' ? 'gold-t' : tier.cssClass === 'platinum' ? 'platinum-t' : tier.cssClass)
          : 'roadmap-dot locked';

        var nameClass = i === currentIndex ? 'roadmap-tier-name current' : 'roadmap-tier-name';
        var svgCheck = svgIcon('<polyline points="20 6 9 17 4 12"/>', 2.5);
        var svgDot = '<svg width="1em" height="1em" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5" fill="currentColor"/></svg>';
        var checkMark = i < currentIndex
          ? '<div class="roadmap-check">' + svgCheck + '</div>'
          : (i === currentIndex ? '<div class="roadmap-check" style="color:var(--gold)">' + svgDot + '</div>' : '');

        item.innerHTML = '<div class="' + dotClass + '">' + tier.icon + '</div>' +
          '<div class="roadmap-info"><div class="' + nameClass + '">' + tier.name + '</div></div>' + checkMark;

        body.appendChild(item);
      });
    }

    function animateNumber(elementId, target) {
      var el = document.getElementById(elementId);
      if (target === 0) { el.textContent = '0'; return; }
      var current = 0;
      var step = Math.max(1, Math.floor(target / 30));
      var interval = setInterval(function() {
        current += step;
        if (current >= target) {
          current = target;
          clearInterval(interval);
        }
        el.textContent = current;
      }, 30);
    }

    async function init() {
      try {
        // Debug mode for localhost
        var isDebug = location.hostname === 'localhost' || location.hostname === '127.0.0.1';

        var lineUid = null;

        if (isDebug) {
          console.log('[DEBUG] Running in debug mode');
          lineUid = 'U_debug_user_001';
          renderStatus({
            user: { found: true, display_name: 'テストユーザー', tier: 'Silver', total_points: 150, visit_count: 6, medals: ['Courteous', 'Considerate', 'Punctual', 'Pristine'] },
            visits_count: 6,
            ledger_count: 6
          });
          return;
        }

        // LIFF init
        await liff.init({ liffId: CONFIG.LIFF_ID });

        if (!liff.isLoggedIn()) {
          liff.login();
          return;
        }

        var profile = await liff.getProfile();
        lineUid = profile.userId;

        // Fetch status from webhook
        var res = await fetch(CONFIG.WEBHOOK_STATUS, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ line_uid: lineUid })
        });

        if (!res.ok) throw new Error('Server error: ' + res.status);

        var data = await res.json();

        if (!data.user || !data.user.found) {
          showView('notfoundView');
          return;
        }

        // Use LINE profile name if display_name is generic
        if (!data.user.display_name || data.user.display_name === 'ゲスト') {
          data.user.display_name = profile.displayName;
        }

        renderStatus(data);

      } catch (err) {
        console.error('Init error:', err);
        document.getElementById('errorMsg').innerHTML =
          'データの取得に失敗しました。<br>もう一度お試しください。';
        showView('errorView');
      }
    }

    init();
  </script>
</body>
</html>
